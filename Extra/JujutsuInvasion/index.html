<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJK: Invasion Technique Claims</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<header>
    <h1>JJK: Invasion Technique Claims</h1>
    <div id="countdown"></div>
</header>

<section class="controls">

    <input
            id="search"
            placeholder="Search Technique or User..."
    >

    <select id="sort">
        <option value="tech">Technique A-Z</option>
        <option value="owner">Owner A-Z</option>
        <option value="newest">Newest</option>
    </select>

</section>

<section class="claim-form">

    <input id="technique" placeholder="Technique Name">
    <input id="owner" placeholder="Claimed By">
    <input id="discord" placeholder="Discord Link">
    <input id="wiki" placeholder="Wiki Link">

    <button id="claimBtn">
        Claim Technique
    </button>

</section>

<section id="claims"></section>

<script src="app.js"></script>

</body>
</html>
